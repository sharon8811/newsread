name: newsread

services:
  db:
    # pgvector build of Postgres 16 (same major, existing pgdata volume keeps working);
    # the vector extension powers semantic article search.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: newsread
      POSTGRES_PASSWORD: newsread
      POSTGRES_DB: newsread
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsread"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      NEWSREAD_DATABASE_URL: postgresql+asyncpg://newsread:newsread@db:5432/newsread
      NEWSREAD_REDIS_URL: redis://redis:6379/0
      NEWSREAD_JWT_SECRET: ${NEWSREAD_JWT_SECRET:-dev-secret-change-me}
      NEWSREAD_CORS_ORIGINS: http://localhost:3000
      # A set SEARXNG_BASE_URL in .env points at the host (localhost:8080),
      # but inside the compose network the instance lives at searxng:8080 —
      # rewrite it. Set NEWSREAD_SEARXNG_BASE_URL to use an external instance.
      NEWSREAD_SEARXNG_BASE_URL: ${NEWSREAD_SEARXNG_BASE_URL:-${SEARXNG_BASE_URL:+http://searxng:8080}}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: arq app.worker.WorkerSettings
    # Same .env as the backend: the worker is what actually calls the LLM
    # (summaries + embeddings), so it needs the OPENAI_* credentials too.
    env_file:
      - path: .env
        required: false
    environment:
      NEWSREAD_DATABASE_URL: postgresql+asyncpg://newsread:newsread@db:5432/newsread
      NEWSREAD_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Self-hosted web search for the Q&A agent (local alternative to Tavily).
  # Opt-in: docker compose --profile search up -d searxng
  # Then set SEARXNG_BASE_URL in .env (see .env.example).
  searxng:
    image: searxng/searxng:latest
    profiles: ["search"]
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-dev-secret-change-me}
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
