name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (FastAPI + workers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: newsread
          POSTGRES_PASSWORD: newsread
          POSTGRES_DB: newsread_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U newsread"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # conftest.py reads this (via setdefault) to reach the CI database.
      NEWSREAD_DATABASE_URL: postgresql+asyncpg://newsread:newsread@localhost:5432/newsread_test

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Create virtualenv and install deps
        run: |
          uv venv .venv
          VIRTUAL_ENV=.venv uv pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage (fail under 90%)
        run: .venv/bin/python -m pytest --cov --cov-report=term-missing --cov-fail-under=90

  frontend:
    name: Frontend tests (Next.js / React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage (thresholds enforced in vitest.config.ts)
        run: npm run test:cov
