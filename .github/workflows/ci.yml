name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (FastAPI + workers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: newsread
          POSTGRES_PASSWORD: newsread
          POSTGRES_DB: newsread_test
        ports:
          - 5432:5432
        # tmpfs data dir: the suite is bound by commit/TRUNCATE fsync latency,
        # not CPU — RAM-backed storage halves the suite (measured ~31s -> ~16s
        # at 4 workers). The databases are throwaway, so durability is moot.
        options: >-
          --health-cmd "pg_isready -U newsread"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data

    env:
      # conftest.py reads this (via setdefault) to reach the CI database.
      NEWSREAD_DATABASE_URL: postgresql+asyncpg://newsread:newsread@localhost:5432/newsread_test

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Create virtualenv and install deps
        run: |
          uv venv .venv
          VIRTUAL_ENV=.venv uv pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage (fail under 90%)
        # -n auto: pytest-xdist, one worker per CPU; each worker gets its own
        # database (see tests/conftest.py), created on demand. Don't raise the
        # worker count past the core count: the suite bottlenecks on Postgres,
        # and oversubscribed workers measurably slow it down (4w 31s / 8w 40s /
        # 20w 54s on a 10-core dev box).
        run: .venv/bin/python -m pytest -n auto --cov --cov-report=term-missing --cov-fail-under=90

  frontend:
    name: Frontend tests (Next.js / React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage (thresholds enforced in vitest.config.ts)
        run: npm run test:cov

  mobile:
    name: Mobile checks (Expo / React Native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci
