<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">NewsRead</title>
  <desc id="desc">NewsRead — a self-hosted RSS reader where AI triages your feeds and shares carry your commentary. Shown with a feed card, its AI summary, and a shared note.</desc>

  <!-- board -->
  <rect width="1200" height="380" rx="24" fill="#131417"/>
  <rect x="0.5" y="0.5" width="1199" height="379" rx="24" fill="none" stroke="#2b2e35"/>

  <!-- ================= title block ================= -->
  <g transform="translate(64 78)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="4" fill="#9ba0aa">SELF-HOSTED&#160;&#160;·&#160;&#160;RSS&#160;+&#160;AI&#160;&#160;·&#160;&#160;FAIR&#160;SOURCE</text>

    <text x="-3" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5" fill="#e6e7ea">NewsRead<tspan fill="#6079ff">.</tspan></text>

    <text x="0" y="132" font-family="Georgia, 'Times New Roman', serif" font-size="27" fill="#c6c9cf">AI triages your feeds.</text>
    <text x="0" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="27" fill="#c6c9cf">Your shares carry your take.</text>

    <!-- metadata row -->
    <g transform="translate(0 224)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="2">
      <circle cx="5" cy="-5" r="4" fill="#6079ff"/>
      <text x="20" y="0" fill="#9ba0aa">NEXT.JS&#160;&#160;·&#160;&#160;FASTAPI&#160;&#160;·&#160;&#160;POSTGRES&#160;&#160;·&#160;&#160;ANY&#160;LLM</text>
    </g>
  </g>

  <!-- ================= feed-card specimen ================= -->
  <!-- card 2 (read, behind) -->
  <g transform="translate(714 252)">
    <rect width="422" height="104" rx="12" fill="#17181c" stroke="#212329"/>
    <text x="24" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2" fill="#6a6e79">ORBITAL WEEKLY · 5H AGO</text>
    <text x="24" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#7d818b">Europa Clipper&#8217;s first gravity assist, explained</text>
  </g>

  <!-- card 1 (unread, with AI summary) -->
  <g transform="translate(690 44)">
    <rect width="446" height="152" rx="12" fill="#1a1c20" stroke="#2b2e35"/>
    <circle cx="26" cy="31" r="4.5" fill="#6079ff"/>
    <text x="40" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2" fill="#9ba0aa">THE BUILD LOG · 2H AGO</text>
    <text x="25" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#e6e7ea">SQLite: 35% faster than the filesystem</text>

    <!-- AI summary teaser -->
    <g transform="translate(25 92)">
      <rect width="396" height="38" rx="8" fill="#6079ff" opacity="0.11"/>
      <rect width="3" height="38" rx="1.5" fill="#6079ff"/>
      <text x="16" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#8b9cff">AI</text>
      <text x="40" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#a6aab3">One database beats thousands of little files.</text>
    </g>
  </g>

  <!-- shared note, attached to card 1 -->
  <g transform="translate(872 176)">
    <path d="M28 12 L40 0 L52 12" fill="#20232c"/>
    <rect y="12" width="292" height="52" rx="12" fill="#20232c" stroke="#6079ff" stroke-opacity="0.38"/>
    <circle cx="30" cy="38" r="13" fill="#6079ff"/>
    <text x="30" y="43" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#f6f7ff">D</text>
    <text x="52" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#e6e7ea">@dana</text>
    <text x="52" y="53" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#9ba0aa">worth it for the syscall numbers</text>
  </g>
</svg>
