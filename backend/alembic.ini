# Alembic reads the database URL from app.config.settings (env.py), so the
# usual sqlalchemy.url key is intentionally absent here.
[alembic]
script_location = alembic
# `app` is not an installed package; make it importable from the backend root.
prepend_sys_path = .
# Revision filenames start with the zero-padded numeric id, not a hash prefix.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
